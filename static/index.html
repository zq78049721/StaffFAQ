<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能人事助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>💼 智能人事助手</h1>
            </div>
            <div class="sidebar-content">
                <!-- 可以在这里添加历史记录、新功能等 -->
            </div>
            <div class="sidebar-footer">
                StaffFAQ · <a href="https://github.com/zq78049721/StaffFAQ" target="_blank">GitHub</a>
            </div>
        </aside>

        <!-- 右侧主内容区 -->
        <main class="main-content">
            <!-- 聊天消息容器 -->
            <div class="chat-messages-container" id="chat-messages">
                <!-- 聊天消息将通过 JavaScript 动态添加 -->
            </div>

            <!-- 输入框容器 -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="请输入你的人事问题..." autocomplete="off" disabled>
                    <button id="send-btn" onclick="sendMessage()" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Markdown 解析库 -->
    <script src="/static/js/lib/marked.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
